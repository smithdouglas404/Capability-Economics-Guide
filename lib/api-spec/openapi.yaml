openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: industries
    description: Industry knowledge graph
  - name: capabilities
    description: Capability management
  - name: organizations
    description: Organization management
  - name: dashboard
    description: Dashboard and analytics
  - name: projects
    description: Technology project overlays
  - name: insights
    description: AI-powered insights, thresholds, leaderboard, ontology, and white papers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /industries:
    get:
      operationId: listIndustries
      tags: [industries]
      summary: List all industries
      responses:
        "200":
          description: List of industries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Industry"

  /industries/{id}:
    get:
      operationId: getIndustry
      tags: [industries]
      summary: Get industry by ID with its capabilities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Industry with capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndustryDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /capabilities:
    get:
      operationId: listCapabilities
      tags: [capabilities]
      summary: List capabilities with optional industry filter
      parameters:
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of capabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Capability"

  /capabilities/{id}:
    get:
      operationId: getCapability
      tags: [capabilities]
      summary: Get capability detail with metrics, dependencies, and role mappings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Capability with full details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /roles:
    get:
      operationId: listRoles
      tags: [capabilities]
      summary: List all C-suite roles
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CSuiteRole"

  /organizations:
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{sessionToken}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization by session token
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization name or size
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                size:
                  type: string
                  enum: [small, mid, large, enterprise]
      responses:
        "200":
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteOrganization
      tags: [organizations]
      summary: Delete an organization and all its assessments
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Organization deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /organizations/{sessionToken}/assessments:
    get:
      operationId: listAssessments
      tags: [organizations]
      summary: List capability assessments for an organization
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"
    put:
      operationId: upsertAssessments
      tags: [organizations]
      summary: Create or update capability assessments in bulk
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAssessmentsRequest"
      responses:
        "200":
          description: Updated assessments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assessment"

  /organizations/{sessionToken}/assessments/{capabilityId}:
    delete:
      operationId: deleteAssessment
      tags: [organizations]
      summary: Delete a specific capability assessment
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
        - name: capabilityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Assessment deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /organizations/{sessionToken}/upload-csv:
    post:
      operationId: uploadCsv
      tags: [organizations]
      summary: Upload CSV text with capability assessments
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsvUploadResponse"

  /industries/compare:
    get:
      operationId: compareIndustries
      tags: [industries]
      summary: Compare capability benchmarks across industries
      responses:
        "200":
          description: Cross-industry comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndustryComparison"

  /organizations/{sessionToken}/dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard data with maturity vs benchmarks
      parameters:
        - name: sessionToken
          in: path
          required: true
          schema:
            type: string
        - name: roleSlug
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all technology projects
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of technology projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TechnologyProject"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project details with capability impacts, executive insights, and risks
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Full project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /thresholds:
    get:
      operationId: listThresholds
      tags: [insights]
      summary: List R/Y/G capability thresholds
      parameters:
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of capability thresholds with status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapabilityThreshold"

  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: List capability insights
      parameters:
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of capability insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapabilityInsight"

  /insights/generate:
    post:
      operationId: generateInsights
      tags: [insights]
      summary: Generate AI-powered insights for an industry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInsightsRequest"
      responses:
        "200":
          description: Generated insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInsightsResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leaderboard:
    get:
      operationId: listLeaderboard
      tags: [insights]
      summary: List industry leaderboard entries
      parameters:
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /white-papers:
    get:
      operationId: listWhitePapers
      tags: [insights]
      summary: List industry white papers
      parameters:
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of white papers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhitePaper"

  /ontology:
    get:
      operationId: getOntology
      tags: [insights]
      summary: Get capability ontology relationships and industry adapters
      parameters:
        - name: industryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Ontology relationships and adapters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OntologyData"

  /cvi/current:
    get:
      operationId: getCVICurrent
      tags: [cvi]
      summary: Get current CVI index value and industry breakdowns
      responses:
        "200":
          description: Current CVI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CVIData"

  /cvi/history:
    get:
      operationId: getCVIHistory
      tags: [cvi]
      summary: Get historical CVI index values
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: CVI history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CVIHistoryEntry"

  /cvi/refresh:
    post:
      operationId: refreshCVI
      tags: [cvi]
      summary: Trigger CVI recalculation with optional triangulation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                industryId:
                  type: integer
                  nullable: true
      responses:
        "200":
          description: Refreshed CVI data with triangulation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  cei:
                    $ref: "#/components/schemas/CVIData"
                  triangulations:
                    type: array
                    items:
                      type: object
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cvi/methodology:
    get:
      operationId: getCVIMethodology
      tags: [cvi]
      summary: Get CVI calculation methodology documentation
      responses:
        "200":
          description: Methodology documentation
          content:
            application/json:
              schema:
                type: object
                properties:
                  methodology:
                    type: string
                  version:
                    type: string
                required: [methodology, version]

  /agent/status:
    get:
      operationId: getAgentStatus
      tags: [agent]
      summary: Get current agent status, scheduler state, and memory stats
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStatusResponse"

  /agent/trigger:
    post:
      operationId: triggerAgentRun
      tags: [agent]
      summary: Manually trigger an autonomous agent run
      responses:
        "200":
          description: Agent run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunResult"
        "409":
          description: Agent is already running

  /agent/history:
    get:
      operationId: getAgentHistory
      tags: [agent]
      summary: Get history of agent runs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of agent runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRunResult"

  /agent/events:
    get:
      operationId: getAgentEvents
      tags: [agent]
      summary: SSE stream of real-time agent activity events
      responses:
        "200":
          description: Server-Sent Events stream

  /agent/memories:
    get:
      operationId: getAgentMemories
      tags: [agent]
      summary: Get agent memories
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of agent memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentMemory"

  /research:
    post:
      operationId: researchCapability
      tags: [insights]
      summary: Research a capability or industry topic using Perplexity
      description: Queries the Perplexity API for live research data with citations. Returns structured findings with source URLs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchRequest"
      responses:
        "200":
          description: Research results with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchResponse"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Research service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /data-sources:
    get:
      operationId: listDataSources
      tags: [insights]
      summary: List data source citations
      description: Returns data source citations. Optionally filter by comma-separated IDs.
      parameters:
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of source IDs to retrieve
      responses:
        "200":
          description: List of data source citations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DataSource"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Industry:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        capabilityCount:
          type: integer
      required: [id, slug, name, description, icon, capabilityCount]

    IndustryDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/Capability"
      required: [id, slug, name, description, icon, capabilities]

    LifecycleStage:
      type: string
      enum: [emerging, adopted, mature, decaying, obsolete]
      description: |
        Derived (never persisted) capability lifecycle stage. Computed on
        read from the capability's current cviComponents posterior
        (consensusScore + velocity); falls back to benchmarkScore when no
        posterior exists. See `services/lifecycle.ts` for thresholds.

    Capability:
      type: object
      properties:
        id:
          type: integer
        industryId:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        traditionalView:
          type: string
        economicView:
          type: string
        benchmarkScore:
          type: number
        lifecycleStage:
          $ref: "#/components/schemas/LifecycleStage"
      required: [id, industryId, slug, name, description, traditionalView, economicView, benchmarkScore]

    CapabilityDetail:
      type: object
      properties:
        id:
          type: integer
        industryId:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        traditionalView:
          type: string
        economicView:
          type: string
        benchmarkScore:
          type: number
        lifecycleStage:
          $ref: "#/components/schemas/LifecycleStage"
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityMetric"
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityDependency"
        roleMappings:
          type: array
          items:
            $ref: "#/components/schemas/RoleMapping"
      required: [id, industryId, slug, name, description, traditionalView, economicView, benchmarkScore, metrics, dependencies, roleMappings]

    CapabilityMetric:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        unit:
          type: string
        benchmarkValue:
          type: number
          nullable: true
      required: [id, name, description, unit]

    CapabilityDependency:
      type: object
      properties:
        id:
          type: integer
        dependsOnId:
          type: integer
        dependsOnName:
          type: string
        strength:
          type: string
      required: [id, dependsOnId, dependsOnName, strength]

    RoleMapping:
      type: object
      properties:
        roleId:
          type: integer
        roleTitle:
          type: string
        roleName:
          type: string
        relevance:
          type: string
        perspective:
          type: string
      required: [roleId, roleTitle, roleName, relevance, perspective]

    CSuiteRole:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        name:
          type: string
        focus:
          type: string
        icon:
          type: string
        color:
          type: string
      required: [id, slug, title, name, focus, icon, color]

    CreateOrganizationRequest:
      type: object
      properties:
        name:
          type: string
        industryId:
          type: integer
        size:
          type: string
          enum: [small, mid, large, enterprise]
      required: [name, industryId]

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        industryId:
          type: integer
        size:
          type: string
        sessionToken:
          type: string
        createdAt:
          type: string
      required: [id, name, industryId, size, sessionToken, createdAt]

    OrganizationDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        industryId:
          type: integer
        industryName:
          type: string
        size:
          type: string
        sessionToken:
          type: string
        assessmentCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, industryId, industryName, size, sessionToken, assessmentCount, createdAt]

    Assessment:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        capabilityId:
          type: integer
        capabilityName:
          type: string
        capabilitySlug:
          type: string
        maturityScore:
          type: number
        investmentLevel:
          type: string
        strategicImportance:
          type: string
        notes:
          type: string
          nullable: true
        benchmarkScore:
          type: number
        assessedAt:
          type: string
      required: [id, organizationId, capabilityId, capabilityName, capabilitySlug, maturityScore, investmentLevel, strategicImportance, benchmarkScore, assessedAt]

    UpsertAssessmentsRequest:
      type: object
      properties:
        assessments:
          type: array
          items:
            type: object
            properties:
              capabilityId:
                type: integer
              maturityScore:
                type: number
                minimum: 0
                maximum: 100
              investmentLevel:
                type: string
                enum: [minimal, low, moderate, high, strategic]
              strategicImportance:
                type: string
                enum: [low, medium, high, critical]
              notes:
                type: string
                nullable: true
            required: [capabilityId, maturityScore]
      required: [assessments]

    CsvUploadResponse:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
      required: [imported, skipped, errors]

    DashboardData:
      type: object
      properties:
        organization:
          $ref: "#/components/schemas/OrganizationDetail"
        summary:
          type: object
          properties:
            totalCapabilities:
              type: integer
            assessedCapabilities:
              type: integer
            averageMaturity:
              type: number
            averageBenchmark:
              type: number
            topGaps:
              type: array
              items:
                $ref: "#/components/schemas/GapAnalysis"
            topStrengths:
              type: array
              items:
                $ref: "#/components/schemas/GapAnalysis"
          required: [totalCapabilities, assessedCapabilities, averageMaturity, averageBenchmark, topGaps, topStrengths]
        radarData:
          type: array
          items:
            type: object
            properties:
              capability:
                type: string
              maturity:
                type: number
              benchmark:
                type: number
            required: [capability, maturity, benchmark]
        assessments:
          type: array
          items:
            $ref: "#/components/schemas/Assessment"
      required: [organization, summary, radarData, assessments]

    GapAnalysis:
      type: object
      properties:
        capabilityName:
          type: string
        maturityScore:
          type: number
        benchmarkScore:
          type: number
        gap:
          type: number
      required: [capabilityName, maturityScore, benchmarkScore, gap]

    IndustryComparison:
      type: object
      properties:
        industries:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              slug:
                type: string
              avgBenchmark:
                type: number
              capabilityCount:
                type: integer
              topCapability:
                type: string
