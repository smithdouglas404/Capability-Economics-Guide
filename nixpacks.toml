# Nixpacks config for Railway — overrides auto-detected pnpm workspace handling.
# Single-service deploy: api-server hosts /api routes AND serves the built
# capability-economics SPA from artifacts/capability-economics/dist/public.

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  # Corepack in Node 22.11 has stale signing keys and fails to verify recent
  # pnpm releases. Install pnpm directly via npm instead — the packageManager
  # field in package.json still pins the exact version.
  "npm install -g pnpm@10.26.1",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm run build:deploy"]

[start]
cmd = "pnpm run start"
