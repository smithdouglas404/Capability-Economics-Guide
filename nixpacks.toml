# Nixpacks config for Railway.
# Each entry in cmds becomes a separate Docker RUN instruction, so PATH/config
# changes don't persist between entries. Everything that depends on pnpm must
# be in a single && chain within one cmd entry.

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm config set prefix /usr/local && npm install -g pnpm@10.26.1 && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["echo \"VITE_CLERK_PUBLISHABLE_KEY present: ${VITE_CLERK_PUBLISHABLE_KEY:+yes}\" && pnpm run build:deploy"]

[start]
cmd = "pnpm run start"
